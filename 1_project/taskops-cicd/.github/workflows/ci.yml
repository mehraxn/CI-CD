name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality & security gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dev requirements
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black --check .

      - name: isort (check)
        run: isort --check-only .

      - name: Pytest
        run: pytest

      - name: Bandit
        run: bandit -r app

      - name: pip-audit
        run: pip-audit -r requirements.txt

  docker:
    name: Build & smoke-test image
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t taskops:ci .

      - name: Scan image with Trivy (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: taskops:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          # Ignore vulnerabilities with no fix available yet — realistic for a
          # portfolio project so the build isn't blocked by un-patchable base
          # image CVEs while still failing on actionable HIGH/CRITICAL issues.
          ignore-unfixed: true

      - name: Run container
        run: |
          docker run -d --name taskops \
            -p 5000:5000 \
            -e FLASK_SECRET_KEY=ci-test-secret \
            taskops:ci

      - name: Smoke-test /health
        run: |
          for i in $(seq 1 10); do
            if curl -fsS http://localhost:5000/health | grep -q '"status": *"ok"'; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i: not ready yet, retrying..."
            sleep 3
          done
          echo "Health check failed. Container logs:"
          docker logs taskops
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f taskops || true

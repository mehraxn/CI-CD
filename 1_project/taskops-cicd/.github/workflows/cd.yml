name: CD

on:
  push:
    branches: [main]

jobs:
  # Re-run the critical quality gates so a broken commit is never deployed,
  # even if someone pushes straight to main.
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint, format-check, test, security
        run: |
          ruff check .
          black --check .
          isort --check-only .
          pytest
          bandit -r app
          pip-audit -r requirements.txt

  deploy:
    name: Build, push & deploy
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        # GHCR requires a lowercase path; lowercase the owner defensively so an
        # uppercase org/user name does not break the push.
        run: echo "IMAGE=ghcr.io/${OWNER,,}/taskops" >>"$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Scan image with Trivy before publishing (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push image to GHCR
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Copy compose stack and scripts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "docker-compose.prod.yml,docker/nginx.conf,scripts/*.sh"
          target: "taskops"

      - name: Deploy over SSH (compose + nginx)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # script_stop makes the remote shell fail fast on any error.
          script_stop: true
          envs: IMAGE,IMAGE_TAG,FLASK_SECRET_KEY,MAX_TITLE_LENGTH,HTTP_PORT,GHCR_USER,GHCR_TOKEN
          script: |
            chmod +x taskops/scripts/*.sh
            bash taskops/scripts/deploy.sh
        env:
          IMAGE: ${{ env.IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          MAX_TITLE_LENGTH: "120"
          HTTP_PORT: "80"
          # GHCR creds so the server can pull the (private by default) image.
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-deploy health smoke test
        env:
          HEALTH_URL: http://${{ secrets.DEPLOY_HOST }}/health
        run: bash scripts/smoke_test.sh

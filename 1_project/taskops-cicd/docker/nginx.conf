# Reverse proxy: all traffic -> TaskOps app, with /health passed through.
upstream taskops {
    server app:5000;
    # Reuse upstream connections instead of opening one per request.
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Compress text responses (HTML is always included; add CSS/JS/JSON).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;

    # Reasonable upstream timeouts so a hung app fails fast instead of hanging.
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Allow modest request bodies (task forms are tiny).
    client_max_body_size 1m;

    # Required for upstream keepalive to take effect.
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Common proxy headers applied to every location.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Dedicated pass-through for the health probe (never cached).
    location = /health {
        proxy_pass http://taskops/health;
    }

    # Static assets: let browsers cache for a day (assets are small and
    # change rarely; a conservative TTL avoids stale-CSS surprises).
    location /static/ {
        proxy_pass http://taskops;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://taskops;
    }
}

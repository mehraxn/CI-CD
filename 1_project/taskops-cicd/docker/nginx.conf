# Reverse proxy: all traffic -> TaskOps app, with /health passed through.
upstream taskops {
    server app:5000;
}

server {
    listen 80;
    server_name _;

    # Reasonable upstream timeouts so a hung app fails fast instead of hanging.
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Allow modest request bodies (task forms are tiny).
    client_max_body_size 1m;

    # Common proxy headers applied to every location.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Dedicated pass-through for the health probe.
    location = /health {
        proxy_pass http://taskops/health;
    }

    location / {
        proxy_pass http://taskops;
    }
}

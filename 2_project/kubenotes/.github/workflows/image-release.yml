# Image Release — build the Docker image, push it to GHCR, then Trivy-scan it.
#
# IMPORTANT — placement (same rule as ci.yml):
#   GitHub only runs workflows from `.github/workflows/` at the REPOSITORY ROOT.
#   Push the CONTENTS of `kubenotes/` as the repo root (the `kubeops-gitops`
#   repo) so this file is discovered and the Dockerfile sits at the root.
#   For a monorepo layout instead, move this file to <root>/.github/workflows/,
#   set `context:` to 2_project/kubenotes, and scope `on.push.paths`.
#
# No cloud deployment happens here — deployment is via GitOps (Argo CD).

name: Image Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN needs packages:write to push to GHCR.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build, push & scan image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase. repository_owner can contain
      # uppercase, so lowercase it here and reuse via the step output.
      - name: Compute lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "image=ghcr.io/${OWNER,,}/kubeops" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, tag with both `latest` and the commit SHA, and push both.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.sha }}

      # Scan the image we just pushed (we are still logged in, so it can pull).
      - name: Trivy scan pushed image (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.img.outputs.image }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

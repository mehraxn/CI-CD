<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}TaskOps{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('taskops.index') }}">$ taskops</a>
      <nav class="nav">
        <a href="{{ url_for('taskops.tasks') }}">tasks</a>
        <a href="{{ url_for('taskops.new_task') }}">new</a>
      </nav>
    </header>

    <main class="content">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <ul class="flashes" role="status" aria-live="polite">
            {% for category, message in messages %}
              <li class="flash flash--{{ category }}">{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <footer
      class="statusbar"
      data-health-url="{{ url_for('taskops.health') }}"
    >
      <span class="statusbar__label">health</span>
      <span class="statusbar__dot" id="health-dot" aria-hidden="true"></span>
      <span class="statusbar__value" id="health-value">checking…</span>
    </footer>

    <script src="{{ url_for('static', filename='js/health.js') }}" defer></script>
  </body>
</html>

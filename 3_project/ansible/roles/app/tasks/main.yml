---
- name: Install Docker and the Compose plugin
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started

- name: Create the application service account
  ansible.builtin.user:
    name: "{{ app_user | default('cloudops') }}"
    comment: CloudOps application service account
    home: "{{ app_root | default('/opt/cloudops') }}"
    shell: /usr/sbin/nologin
    groups: docker
    append: true
    create_home: true
    system: true

- name: Create the application directory
  ansible.builtin.file:
    path: "{{ app_root | default('/opt/cloudops') }}/app"
    state: directory
    owner: "{{ app_user | default('cloudops') }}"
    group: "{{ app_user | default('cloudops') }}"
    mode: "0755"

- name: Check for the shared Docker network
  ansible.builtin.command: docker network inspect cloudops
  register: cloudops_network
  changed_when: false
  failed_when: false

- name: Create the shared Docker network
  ansible.builtin.command: docker network create cloudops
  when: cloudops_network.rc != 0
  changed_when: true

- name: Copy the Flask application source
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../app/"
    dest: "{{ app_root | default('/opt/cloudops') }}/app/"
    owner: "{{ app_user | default('cloudops') }}"
    group: "{{ app_user | default('cloudops') }}"
    mode: preserve
  register: app_files

- name: Build the application image when source files change
  ansible.builtin.command:
    cmd: "docker build --tag cloudops-app:local {{ app_root | default('/opt/cloudops') }}/app"
  when: app_files.changed
  changed_when: true

- name: Install the application systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/cloudops-app.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=CloudOps Flask application container
      Requires=docker.service
      After=docker.service network-online.target

      [Service]
      Type=simple
      User={{ app_user | default('cloudops') }}
      Group={{ app_user | default('cloudops') }}
      ExecStartPre=-/usr/bin/docker rm -f cloudops-app
      ExecStart=/usr/bin/docker run --name cloudops-app --network cloudops --publish 127.0.0.1:8000:8000 cloudops-app:local
      ExecStop=/usr/bin/docker stop cloudops-app
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  register: app_service_unit

- name: Restart the application when its image or service changes
  ansible.builtin.systemd_service:
    name: cloudops-app
    daemon_reload: true
    enabled: true
    state: restarted
  when: app_files.changed or app_service_unit.changed

- name: Ensure the application service is running
  ansible.builtin.systemd_service:
    name: cloudops-app
    daemon_reload: true
    enabled: true
    state: started
